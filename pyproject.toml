[project]
name = "resume-intelligence"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "alembic>=1.13.0",
    "asyncpg>=0.29.0",
    "fastapi>=0.115.0",
    "pydantic-settings>=2.3.0",
    "python-multipart>=0.0.9",
    "qdrant-client>=1.9.0",
    "slowapi>=0.1.9",
    "sqlalchemy>=2.0.30",
    "uvicorn[standard]>=0.30.0",
    "arq>=0.26.0",
    "redis>=5.0.0",
    "aiofiles>=24.1.0",
    "groq>=0.9.0",
    "sentence-transformers>=3.0.0",
    "langgraph>=0.1.0",
    "pdfplumber>=0.11.0",
    "numpy>=1.26.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[argon2]>=1.7.4",
    "structlog>=24.0.0",
    "loguru>=0.7.3",
]

[tool.ruff]
# Ignore auto-generated Alembic files
exclude = ["app/migrations"]
# Set the maximum line length to 88 (industry standard, matches Black)
line-length = 88
# Assume Python 3.13
target-version = "py313"

[tool.ruff.lint]
# A robust set of rules for a modern Python project
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "UP",  # pyupgrade (upgrades syntax to modern Python)
    "B",   # flake8-bugbear (finds likely bugs and design problems)
    "SIM", # flake8-simplify (helps simplify code)
    "RUF", # ruff-specific rules
    "C4",  # flake8-comprehensions (better list/dict/set comprehensions)
    "N",   # pep8-naming (enforces naming conventions)
    "PT",  # flake8-pytest-style (if you use pytest)
    "RET", # flake8-return (checks return values)
]
ignore = [
    "E501", # line too long, handled by the formatter
    "B008", # do not perform function calls in argument defaults (often conflicts with FastAPI Depends())
]

[tool.ruff.lint.per-file-ignores]
# Ignore unused imports in __init__.py files
"__init__.py" = ["F401"]
# Ignore naming and assertions in tests
"tests/*" = ["N802", "S101"] 

[tool.ruff.format]
# Enable auto-formatting of code snippets in docstrings
docstring-code-format = true
# Like Black, use double quotes for strings.
quote-style = "double"

[dependency-groups]
dev = [
    "ruff>=0.9.0",
    "mypy>=1.10.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "types-passlib",
    "sqlalchemy[mypy]",
]
